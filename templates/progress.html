<!DOCTYPE html>
<html lang="en">
<head>
<title>Deploying — Intelligent CI/CD</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a12;
  --surface: #0c1420;
  --surface2: #0f1c2e;
  --border: rgba(56,189,248,0.12);
  --border2: rgba(255,255,255,0.05);
  --accent: #38bdf8;
  --accent2: #0ea5e9;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #f43f5e;
  --terminal-green: #00ffcc;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* GRID BG */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* GLOW */
.glow-top {
  position: fixed;
  top: -120px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 400px;
  background: radial-gradient(ellipse, rgba(56,189,248,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* NAV */
.nav {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(12,20,32,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.nav-logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--yellow);
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.2);
  padding: 5px 12px;
  border-radius: 20px;
}

.blink-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--yellow);
  box-shadow: 0 0 6px var(--yellow);
  animation: blink 1.2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* MAIN LAYOUT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 24px 28px;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  gap: 20px;
  overflow: hidden;
}

/* PIPELINE STEPS */
.pipeline-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
}

.pipe-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
}

.pipe-node {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.4s ease;
  position: relative;
}

.pipe-node.done {
  border-color: var(--green);
  background: rgba(16,185,129,0.1);
  box-shadow: 0 0 16px rgba(16,185,129,0.2);
}

.pipe-node.active {
  border-color: var(--accent);
  background: rgba(56,189,248,0.1);
  box-shadow: 0 0 20px rgba(56,189,248,0.25);
  animation: activePulse 1.5s infinite;
}

@keyframes activePulse {
  0%,100% { box-shadow: 0 0 20px rgba(56,189,248,0.25); }
  50% { box-shadow: 0 0 32px rgba(56,189,248,0.45); }
}

.pipe-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
}

.pipe-label.active { color: var(--accent); }
.pipe-label.done { color: var(--green); }

.pipe-connector {
  width: 60px;
  height: 2px;
  background: var(--border2);
  position: relative;
  top: -12px;
  overflow: hidden;
  flex-shrink: 0;
}

.pipe-connector-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--accent));
  width: 0%;
  transition: width 0.5s ease;
}

.pipe-connector.done .pipe-connector-fill { width: 100%; }
.pipe-connector.active .pipe-connector-fill {
  width: 50%;
  animation: connFlow 1.5s ease-in-out infinite;
}

@keyframes connFlow {
  0% { width: 0%; opacity: 1; }
  100% { width: 100%; opacity: 0.3; }
}

/* TERMINAL */
.terminal-wrap {
  flex: 1;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  min-height: 0;
}

.terminal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}

.terminal-dots { display: flex; gap: 7px; align-items: center; }

.t-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
}
.t-dot.r { background: #ff5f57; }
.t-dot.y { background: #febc2e; }
.t-dot.g { background: #28c840; }

.terminal-filename {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.terminal-filename::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--terminal-green);
  box-shadow: 0 0 6px var(--terminal-green);
  animation: blink 1.2s infinite;
}

.terminal-badges {
  display: flex;
  gap: 8px;
}

.t-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.t-badge.live { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.t-badge.streaming { background: rgba(56,189,248,0.1); color: var(--accent); border: 1px solid rgba(56,189,248,0.2); }

.log-box {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.8;
  color: var(--terminal-green);
  white-space: pre-wrap;
  min-height: 0;
}

.log-box::-webkit-scrollbar { width: 5px; }
.log-box::-webkit-scrollbar-track { background: transparent; }
.log-box::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.2); border-radius: 3px; }

/* LOG LINE COLORS */
.log-box .line-error { color: #f87171; }
.log-box .line-success { color: #34d399; }
.log-box .line-warning { color: #fbbf24; }
.log-box .line-info { color: var(--terminal-green); }

/* CURSOR */
.cursor {
  display: inline-block;
  width: 7px; height: 13px;
  background: var(--terminal-green);
  margin-left: 4px;
  animation: blink 1s infinite;
  vertical-align: middle;
}

/* FOOTER STATUS BAR */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: rgba(255,255,255,0.02);
  border-top: 1px solid var(--border2);
  flex-shrink: 0;
}

.status-left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--yellow);
}

.status-right {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

/* PROGRESS BAR */
.progress-track {
  position: fixed;
  top: 56px;
  left: 0; right: 0;
  height: 2px;
  background: rgba(255,255,255,0.04);
  z-index: 9;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  width: 0%;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px var(--accent);
  animation: progressAnim 4s ease-in-out infinite;
}

@keyframes progressAnim {
  0% { width: 5%; }
  30% { width: 35%; }
  60% { width: 65%; }
  85% { width: 88%; }
  100% { width: 92%; }
}

/* ELAPSED TIMER */
.elapsed {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: rgba(255,255,255,0.04);
  padding: 3px 8px;
  border-radius: 4px;
}
</style>

<script>
  let startTime = Date.now();
  let logInterval;

  window.onload = function () {

    // TIMER
    setInterval(() => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      const el = document.getElementById("elapsedTime");
      if (el) el.textContent = elapsed + "s";
    }, 100);

    // PIPELINE STEPS ANIMATION
    const steps = ["step-clone", "step-analyze", "step-build", "step-deploy"];
    const conns = ["conn-1", "conn-2", "conn-3"];
    let currentStep = 0;

    function advanceStep(logText) {
      if (logText.includes("Cloning") && currentStep < 1) {
        activateStep(0); currentStep = 1;
      }
      if (logText.includes("Analyzing") && currentStep < 2) {
        completeStep(0); activateStep(1); advanceConn(0); currentStep = 2;
      }
      if (logText.includes("Building") && currentStep < 3) {
        completeStep(1); activateStep(2); advanceConn(1); currentStep = 3;
      }
      if ((logText.includes("Deploying") || logText.includes("Rolling back")) && currentStep < 4) {
        completeStep(2); activateStep(3); advanceConn(2); currentStep = 4;
      }
      if (logText.includes("Finished") || logText.includes("Done")) {
        completeStep(3);
      }
    }

    function activateStep(i) {
      const node = document.getElementById(steps[i]);
      const label = document.getElementById(steps[i] + "-label");
      if (node) node.classList.add("active");
      if (label) { label.classList.remove("done"); label.classList.add("active"); }
    }

    function completeStep(i) {
      const node = document.getElementById(steps[i]);
      const label = document.getElementById(steps[i] + "-label");
      if (node) { node.classList.remove("active"); node.classList.add("done"); }
      if (label) { label.classList.remove("active"); label.classList.add("done"); }
    }

    function advanceConn(i) {
      const conn = document.getElementById(conns[i]);
      if (conn) conn.classList.add("done");
    }

    // LOG FETCHING
    function loadLogs() {
      fetch("/logs")
        .then(res => res.text())
        .then(data => {
          const box = document.getElementById("logBox");
          if (!box) return;

          // colorize lines
          const lines = data.split("\n").filter(l => l.trim());
          box.innerHTML = "";

          lines.forEach(line => {
            const span = document.createElement("span");
            let cls = "line-info";
            if (line.includes("❌") || line.includes("FAILED") || line.includes("Error")) cls = "line-error";
            else if (line.includes("✅") || line.includes("Successful") || line.includes("Finished")) cls = "line-success";
            else if (line.includes("⚠️") || line.includes("Risk") || line.includes("Rolling")) cls = "line-warning";
            span.className = cls;
            span.textContent = "➜  " + line + "\n";
            box.appendChild(span);
          });

          box.scrollTop = box.scrollHeight;
          advanceStep(data);

          // update log count
          const countEl = document.getElementById("logCount");
          if (countEl) countEl.textContent = lines.length + " lines";
        });
    }

    loadLogs();
    logInterval = setInterval(loadLogs, 1000);

    // RUN PIPELINE
    fetch("/run-analysis", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ repo_url: "{{ repo_url }}" })
    })
    .then(res => res.text())
    .then(html => {
      clearInterval(logInterval);
      document.open();
      document.write(html);
      document.close();
    })
    .catch(err => {
      clearInterval(logInterval);
      alert("Pipeline failed: " + err);
    });
  };
</script>
</head>
<body>

<div class="glow-top"></div>

<!-- TOP PROGRESS BAR -->
<div class="progress-track">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">🚀 CI/CD Console</div>
  <div class="nav-status">
    <span class="blink-dot"></span>
    Pipeline Running
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- PIPELINE STEPS -->
  <div class="pipeline-row">

    <div class="pipe-step">
      <div class="pipe-node active" id="step-clone">📥</div>
      <div class="pipe-label active" id="step-clone-label">Clone</div>
    </div>

    <div class="pipe-connector" id="conn-1">
      <div class="pipe-connector-fill"></div>
    </div>

    <div class="pipe-step">
      <div class="pipe-node" id="step-analyze">🔍</div>
      <div class="pipe-label" id="step-analyze-label">Analyze</div>
    </div>

    <div class="pipe-connector" id="conn-2">
      <div class="pipe-connector-fill"></div>
    </div>

    <div class="pipe-step">
      <div class="pipe-node" id="step-build">🐳</div>
      <div class="pipe-label" id="step-build-label">Build</div>
    </div>

    <div class="pipe-connector" id="conn-3">
      <div class="pipe-connector-fill"></div>
    </div>

    <div class="pipe-step">
      <div class="pipe-node" id="step-deploy">🚀</div>
      <div class="pipe-label" id="step-deploy-label">Deploy</div>
    </div>

  </div>

  <!-- TERMINAL -->
  <div class="terminal-wrap">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="t-dot r"></div>
        <div class="t-dot y"></div>
        <div class="t-dot g"></div>
      </div>
      <div class="terminal-filename">pipeline.sh</div>
      <div class="terminal-badges">
        <span class="t-badge streaming">Streaming</span>
        <span class="t-badge live">Live</span>
      </div>
    </div>

    <div class="log-box" id="logBox"><span class="line-info">➜  Initializing pipeline...</span>
</div>

    <div class="status-bar">
      <div class="status-left">
        <span class="blink-dot" style="background:var(--terminal-green);box-shadow:0 0 6px var(--terminal-green);width:6px;height:6px;border-radius:50%;display:inline-block;animation:blink 1.2s infinite;"></span>
        ⚡ Running — do not close this tab
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <span class="elapsed" id="logCount">0 lines</span>
        <span class="elapsed">⏱ <span id="elapsedTime">0.0s</span></span>
      </div>
    </div>
  </div>

</div>

</body>
</html>
