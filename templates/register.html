<!DOCTYPE html>
<html>
<head>

<title>Register - Intelligent CI/CD</title>

<style>

/* 🔥 BACKGROUND */
body{
margin:0;
font-family:"Segoe UI",sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#1e293b,#020617);
color:white;
overflow:hidden;
}

/* 🔥 FLOATING GLOW EFFECT */
body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:#38bdf8;
filter:blur(120px);
opacity:0.2;
top:-100px;
left:-100px;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#22c55e;
filter:blur(120px);
opacity:0.2;
bottom:-100px;
right:-100px;
}

/* 🔥 CARD */
.register-box{
position:relative;
background:rgba(30,41,59,0.6);
backdrop-filter:blur(15px);
padding:40px;
border-radius:16px;
width:360px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
animation:fadeIn 0.8s ease;
}

/* 🔥 ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* 🔥 LOGO */
.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
margin-bottom:5px;
letter-spacing:1px;
}

/* 🔥 HEADING */
.register-box h2{
margin-bottom:25px;
font-weight:500;
}

/* 🔥 INPUT */
.input-group{
position:relative;
margin:15px 0;
}

input{
width:100%;
padding:12px 12px;
border:none;
border-radius:8px;
background:#334155;
color:white;
font-size:14px;
outline:none;
transition:0.3s;
}

input:focus{
background:#3b4b63;
box-shadow:0 0 10px rgba(56,189,248,0.5);
}

/* 🔥 BUTTON */
button{
width:100%;
padding:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
border:none;
border-radius:8px;
font-size:16px;
color:white;
font-weight:600;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(34,197,94,0.4);
}

/* 🔥 LINK */
.login{
margin-top:18px;
font-size:14px;
color:#cbd5f5;
}

.login a{
color:#38bdf8;
text-decoration:none;
font-weight:500;
}

.login a:hover{
text-decoration:underline;
}

/* 🔥 SMALL TAGLINE */
.tagline{
font-size:12px;
color:#94a3b8;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">🚀 Intelligent CI/CD</div>
<div class="tagline">Automate. Analyze. Deploy.</div>

<h2>Create Account</h2>

<form method="POST">

<div class="input-group">
<input type="text" name="username" placeholder="👤 Username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="🔒 Password" required>
</div>

<button type="submit">Register</button>

</form>

<div class="login">
Already have an account?  
<a href="/login">Login</a>
</div>

</div>

</body>
</html>
