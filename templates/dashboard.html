<!DOCTYPE html>
<html>
<head>
    <title>Intelligent CI/CD Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
        }

        header {
            background: linear-gradient(90deg, #1e293b, #0f172a);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 30px auto;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card h2 {
            margin: 0;
            font-size: 16px;
            color: #64748b;
        }

        .card p {
            margin-top: 10px;
            font-size: 22px;
            font-weight: bold;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }

        .chart-box {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }

        canvas {
            max-height: 350px !important;
        }

        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    📊 Intelligent CI/CD Analytics Dashboard
</header>

<div class="container">

    <div class="cards">
        <div class="card"><h2>Total Runs</h2><p>{{ total }}</p></div>
        <div class="card"><h2>Low Risk</h2><p style="color:#22c55e;">{{ low }}</p></div>
        <div class="card"><h2>Medium Risk</h2><p style="color:#f59e0b;">{{ medium }}</p></div>
        <div class="card"><h2>High Risk</h2><p style="color:#ef4444;">{{ high }}</p></div>
        <div class="card"><h2>Avg Execution Time</h2><p>{{ avg_time }} sec</p></div>
    </div>

    <div class="charts">

        <div class="chart-box">
            <h3>Risk Distribution</h3>
            <canvas id="riskChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Deployment Status</h3>
            <canvas id="statusChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Execution Time Trend</h3>
            <canvas id="timeChart"></canvas>
        </div>

    </div>

    <div style="text-align:center;">
        <a href="/" class="btn">⬅ Back to Analyzer</a>
    </div>

</div>
<script>
    const low = Number("{{ low }}") || 0;
    const medium = Number("{{ medium }}") || 0;
    const high = Number("{{ high }}") || 0;
    const success = Number("{{ success }}") || 0;
    const rollback = Number("{{ rollback }}") || 0;
    const failed = Number("{{ failed }}") || 0;
    const times = {{ times | default([]) | tojson }};

    new Chart(document.getElementById('riskChart'), {
        type: 'doughnut',
        data: {
            labels: ['LOW', 'MEDIUM', 'HIGH'],
            datasets: [{
                data: [low, medium, high],
                backgroundColor: ['#22c55e','#f59e0b','#ef4444']
            }]
        }
    });

    new Chart(document.getElementById('statusChart'), {
        type: 'bar',
        data: {
            labels: ['Success','Rollback','Failed'],
            datasets: [{
                data: [success, rollback, failed],
                backgroundColor: ['#22c55e','#ef4444','#9ca3af']
            }]
        }
    });

    new Chart(document.getElementById('timeChart'), {
        type: 'line',
        data: {
            labels: times.map((_, index) => index + 1),
            datasets: [{
                label: 'Execution Time (sec)',
                data: times,
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37,99,235,0.2)',
                fill: true,
                tension: 0.3
            }]
        }
    });
</script>

</body>
</html>
