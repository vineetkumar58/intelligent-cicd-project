<!DOCTYPE html>
<html lang="en">
<head>
<title>Create Admin — Intelligent CI/CD</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a12;
  --surface: #0c1420;
  --border: rgba(56,189,248,0.12);
  --border2: rgba(255,255,255,0.06);
  --accent: #38bdf8;
  --green: #10b981;
  --green2: #059669;
  --red: #f43f5e;
  --yellow: #f59e0b;
  --purple: #a78bfa;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.glow {
  position: fixed;
  top: -100px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 350px;
  background: radial-gradient(ellipse, rgba(167,139,250,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 40px;
  width: 100%;
  max-width: 440px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  animation: cardIn 0.35s ease;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--purple), transparent);
  opacity: 0.7;
}

.card-header { margin-bottom: 32px; }

.card-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--purple);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.card-title {
  font-size: 24px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 6px;
}

.card-sub { font-size: 13px; color: var(--muted); }

.field { margin-bottom: 20px; }

.field label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.input-wrap { position: relative; }

.input-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 13px;
  pointer-events: none;
}

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 13px 14px 13px 40px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: var(--purple);
  background: rgba(167,139,250,0.04);
  box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
}

input::placeholder { color: var(--muted); }

.btn-submit {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--purple), #7c3aed);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
  margin-top: 8px;
}
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(167,139,250,0.3); }

.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--muted);
  text-decoration: none;
  transition: 0.2s;
}
.back-link:hover { color: var(--accent); }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,10,18,0.85);
  backdrop-filter: blur(8px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal.open { display: flex; }

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 360px;
  text-align: center;
  animation: mIn 0.2s ease;
}

@keyframes mIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.modal-icon { font-size: 32px; margin-bottom: 14px; }
.modal-title { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

.modal-actions { display: flex; gap: 10px; }

.modal-yes {
  flex: 1; padding: 11px;
  background: linear-gradient(135deg, var(--purple), #7c3aed);
  border: none; border-radius: 8px;
  color: #fff; font-weight: 700;
  font-size: 13px; cursor: pointer; transition: 0.2s;
}
.modal-yes:hover { opacity: 0.9; }

.modal-no {
  flex: 1; padding: 11px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  border-radius: 8px; color: var(--muted);
  font-size: 13px; cursor: pointer; transition: 0.2s;
}
.modal-no:hover { color: var(--text); }
</style>
</head>
<body>
<div class="glow"></div>

<div class="card">
  <div class="card-header">
    <div class="card-eyebrow">Admin Console</div>
    <h2 class="card-title">Create Admin Account</h2>
    <p class="card-sub">Grant admin privileges to a new user</p>
  </div>

  <form method="POST" id="adminForm">
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" name="username" placeholder="Admin username" required>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" name="password" placeholder="Secure password" required>
      </div>
    </div>

    <button type="button" class="btn-submit" onclick="openModal()">Create Admin Account →</button>
  </form>

  <a href="/admin-panel" class="back-link">← Back to Admin Panel</a>
</div>

<div id="confirmModal" class="modal">
  <div class="modal-box">
    <div class="modal-icon">👑</div>
    <div class="modal-title">Create Admin Account?</div>
    <div class="modal-sub">This user will have admin privileges over the platform.</div>
    <div class="modal-actions">
      <button class="modal-yes" onclick="submitForm()">Create</button>
      <button class="modal-no" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
function openModal() { document.getElementById("confirmModal").classList.add("open"); }
function closeModal() { document.getElementById("confirmModal").classList.remove("open"); }
function submitForm() { document.getElementById("adminForm").submit(); }
</script>
</body>
</html>
