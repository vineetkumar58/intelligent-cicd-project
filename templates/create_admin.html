<!doctype html>
<html>
  <head>
    <title>Create Admin</title>

    <style>
      body {
        background: #0f1b2d;
        font-family: Arial;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: #1e2b3f;
        padding: 40px;
        border-radius: 10px;
        width: 350px;
        text-align: center;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 6px;
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        background: #27ae60;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #219150;
      }

      a {
        display: block;
        margin-top: 15px;
        color: #3498db;
        text-decoration: none;
      }

      /* 🔥 MODAL STYLING */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
      }

      .modal-box {
        background: #1e2b3f;
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        width: 300px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
      }

      .modal-actions button {
        margin: 10px;
        padding: 8px 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .yes-btn {
        background: #27ae60;
        color: white;
      }

      .no-btn {
        background: #e74c3c;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Create Admin</h2>

      <form method="POST" id="adminForm">
        <input name="username" placeholder="Admin Username" required />
        <input
          name="password"
          type="password"
          placeholder="Password"
          required
        />

        <!-- 🔥 CHANGED BUTTON -->
        <button type="button" onclick="openModal()">Create Admin</button>
      </form>

      <a href="/admin-panel">Back to Admin Panel</a>
    </div>

    <!-- 🔥 CUSTOM MODAL -->
    <div id="confirmModal" class="modal">
      <div class="modal-box">
        <h3>⚠ Confirm Action</h3>
        <p>Create new ADMIN account?</p>

        <div class="modal-actions">
          <button class="yes-btn" onclick="submitForm()">Yes</button>
          <button class="no-btn" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      function openModal() {
        document.getElementById("confirmModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("confirmModal").style.display = "none";
      }

      function submitForm() {
        document.getElementById("adminForm").submit();
      }
    </script>
  </body>
</html>
