<!DOCTYPE html>
<html>
<head>

<title>Login - Intelligent CI/CD</title>

<style>

/* 🔥 BACKGROUND */
body{
margin:0;
font-family:"Segoe UI",sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#1e293b,#020617);
color:white;
overflow:hidden;
}

/* 🔥 GLOW EFFECT */
body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:#38bdf8;
filter:blur(120px);
opacity:0.2;
top:-80px;
left:-80px;
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:#0ea5e9;
filter:blur(120px);
opacity:0.15;
bottom:-80px;
right:-80px;
}

/* 🔥 CARD */
.login-box{
position:relative;
background:rgba(30,41,59,0.65);
backdrop-filter:blur(16px);
padding:40px;
border-radius:18px;
width:370px;
box-shadow:0 25px 70px rgba(0,0,0,0.7);
text-align:center;
animation:fadeIn 0.7s ease;
}

/* 🔥 ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(25px);}
to{opacity:1; transform:translateY(0);}
}

/* 🔥 LOGO */
.logo{
font-size:22px;
font-weight:600;
color:#38bdf8;
margin-bottom:5px;
letter-spacing:0.5px;
}

/* 🔥 SUBTITLE */
.subtitle{
font-size:13px;
color:#94a3b8;
margin-bottom:25px;
}

/* 🔥 TITLE */
h2{
margin-bottom:20px;
font-weight:500;
}

/* 🔥 INPUT */
.input-group{
position:relative;
margin:15px 0;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:14px;
outline:none;
transition:0.3s;
}

input:focus{
background:#3b4b63;
box-shadow:0 0 12px rgba(56,189,248,0.6);
}

/* 🔥 BUTTON */
button{
width:100%;
padding:12px;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
border:none;
border-radius:10px;
font-size:15px;
color:white;
font-weight:600;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(56,189,248,0.4);
}

/* 🔥 ERROR */
.error{
margin-top:12px;
padding:10px;
background:rgba(231,76,60,0.15);
border-radius:8px;
color:#ff6b6b;
font-size:13px;
}

/* 🔥 REGISTER */
.register{
margin-top:18px;
font-size:14px;
color:#94a3b8;
}

.register a{
color:#38bdf8;
text-decoration:none;
font-weight:500;
}

.register a:hover{
text-decoration:underline;
}

/* 🔥 SMALL DETAIL LINE */
.divider{
margin:15px 0;
height:1px;
background:rgba(255,255,255,0.08);
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">🚀 Intelligent CI/CD</div>
<div class="subtitle">Secure DevOps Deployment Platform</div>

<h2>Welcome Back 👋</h2>

<form method="POST">

<div class="input-group">
<input type="text" name="username" placeholder="👤 Username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="🔒 Password" required>
</div>

<button type="submit">Login</button>

</form>

<!-- 🔥 ERROR -->
{% if error %}
<div class="error">
⚠ {{ error }}
</div>
{% endif %}

<div class="divider"></div>

<div class="register">
Don't have an account?  
<a href="/register">Create Account</a>
</div>

</div>

</body>
</html>
