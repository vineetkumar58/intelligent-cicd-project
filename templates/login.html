<!DOCTYPE html>
<html>
<head>

<title>Login - Intelligent CI/CD</title>

<style>

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* CARD */
.login-box{
  background: rgba(30,41,59,0.8);
  backdrop-filter: blur(12px);
  padding:40px;
  border-radius:16px;
  width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
  animation: fadeIn 0.6s ease-in-out;
}

/* ANIMATION */
@keyframes fadeIn{
  from{
    opacity:0;
    transform: translateY(20px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

/* LOGO */
.logo{
  font-size:22px;
  margin-bottom:8px;
  color:#38bdf8;
  font-weight:600;
  letter-spacing:0.5px;
}

.subtitle{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:25px;
}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#334155;
  color:white;
  font-size:14px;
  outline:none;
  transition:0.3s;
}

input:focus{
  background:#1e293b;
  box-shadow:0 0 0 1px #38bdf8;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  border:none;
  border-radius:8px;
  font-size:15px;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 10px 25px rgba(56,189,248,0.3);
}

/* ERROR BOX */
.error{
  margin-top:10px;
  padding:10px;
  background:rgba(231,76,60,0.2);
  border-radius:8px;
  color:#ff6b6b;
  font-size:13px;
}

/* REGISTER */
.register{
  margin-top:18px;
  font-size:14px;
  color:#94a3b8;
}

.register a{
  color:#38bdf8;
  text-decoration:none;
}

.register a:hover{
  text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">🚀 Intelligent CI/CD</div>
<div class="subtitle">Secure DevOps Deployment Platform</div>

<h2>Welcome Back</h2>

<form method="POST">

<div class="input-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

<!-- 🔥 ERROR MESSAGE -->
{% if error %}
<div class="error">
  ⚠ {{ error }}
</div>
{% endif %}

<div class="register">
Don't have an account?  
<a href="/register">Create Account</a>
</div>

</div>

</body>
</html>
